<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia Request Tracker</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
<body>
    <div class="app-container" id="app-content">
        <!-- Main Content Area -->
        <main class="main-content form-only">
            <!-- Header -->
            <header class="top-header">
                <div class="logo">
                    <div class="logo-icon"><i class="fa-solid fa-photo-film"></i></div>
                    <h2 style="font-size: 1.4rem; font-weight: 700; background: linear-gradient(135deg, var(--text-primary), var(--text-secondary)); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">MediaTrack</h2>
                </div>
                
                <h1 id="page-title" style="margin-left: auto; margin-right: 24px;">Submit New Request</h1>
                
                <div class="header-controls">
                    <div class="theme-switcher">
                        <button class="theme-btn" data-theme="light" title="Light Mode"><i class="fa-solid fa-sun"></i></button>
                        <button class="theme-btn" data-theme="dark" title="Dark Mode"><i class="fa-solid fa-moon"></i></button>
                    </div>
                </div>
            </header>

            <!-- New Request View -->
            <section id="new-request-view" class="view-section active">
            </section>
                <div class="form-container">
                    <form id="request-form">
                        <div class="form-group">
                            <label for="req-title">Request Title <span class="required">*</span></label>
                            <input type="text" id="req-title" placeholder="e.g., Q3 Marketing Campaign Video">
                            <div class="helper-text">Provide a clear, brief name for the task.</div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="req-type">Media Type <span class="required">*</span></label>
                                <select id="req-type">
                                    <option value="" disabled selected>Select type...</option>
                                    <option value="Video">Video Production</option>
                                    <option value="Graphic">Graphic Design</option>
                                    <option value="Photo">Photography</option>
                                    <option value="Animation">Animation/Motion</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="req-priority">Priority Level <span class="required">*</span></label>
                                <select id="req-priority">
                                    <option value="Low">Low - Whenever possible</option>
                                    <option value="Medium" selected>Medium - Normal flow</option>
                                    <option value="High">High - Urgent needed soon</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="req-deadline">Requested Deadline</label>
                                <input type="date" id="req-deadline">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="req-link">Inspiration/Reference Link</label>
                                <input type="url" id="req-link" placeholder="https://example.com/reference">
                            </div>
                            
                            <div class="form-group">
                                <label for="req-file">Attach Reference File</label>
                                <input type="file" id="req-file" class="file-input">
                            </div>
                        </div>

                        <div id="dynamic-video" class="form-row dynamic-section" style="display: none;">
                            <div class="form-group">
                                <label for="req-video-platform">Target Platform</label>
                                <input type="text" id="req-video-platform" placeholder="e.g., TikTok, Facebook, Internal">
                            </div>
                            <div class="form-group">
                                <label for="req-video-duration">Estimated Duration</label>
                                <input type="text" id="req-video-duration" placeholder="e.g., ~60 seconds">
                            </div>
                        </div>
                        
                        <div id="dynamic-graphic" class="form-row dynamic-section" style="display: none;">
                            <div class="form-group">
                                <label for="req-graphic-size">Dimensions / Format</label>
                                <input type="text" id="req-graphic-size" placeholder="e.g., 1080x1080px or A4 Poster">
                            </div>
                            <div class="form-group">
                                <label for="req-graphic-brand">Brand / Style</label>
                                <input type="text" id="req-graphic-brand" placeholder="e.g., Standard Corporate, Playful">
                            </div>
                        </div>

                        <div id="dynamic-photo" class="form-row dynamic-section" style="display: none;">
                            <div class="form-group">
                                <label for="req-photo-location">Shoot Location</label>
                                <input type="text" id="req-photo-location" placeholder="e.g., Main Office Building">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="req-description">Detailed Description <span class="required">*</span></label>
                            <textarea id="req-description" rows="5" placeholder="Provide link to assets, target audience, specific requirements, etc..."></textarea>
                            <div class="helper-text">The more details you provide, the faster the team can deliver exactly what you need.</div>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" id="btn-cancel">Cancel</button>
                            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-paper-plane"></i> Submit Request</button>
                        </div>
                    </form>
                </div>
            </section>

        </main>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast hidden">
        <i class="fa-solid fa-check-circle"></i>
        <span id="toast-message">Request saved successfully!</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
